<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" width="220" height="180">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8dcc8"/>
      <stop offset="100%" stop-color="#d4c2a0"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a87848"/>
      <stop offset="100%" stop-color="#8a5c34"/>
    </linearGradient>
    <linearGradient name="grassGrad"/>
  </defs>

  <!-- 草地底 -->
  <path d="M 0,165 Q 40,155 80,165 Q 120,155 160,165 Q 190,158 220,165 L 220,180 L 0,180 Z" fill="#7a9a52"/>
  <path d="M 20,168 L 18,150 M 35,170 L 34,155 M 190,170 L 192,152 M 205,168 L 208,155" stroke="#5a7a3a" stroke-width="2" stroke-linecap="round"/>

  <!-- 圓滾滾的身體，橢圓為主 -->
  <ellipse cx="110" cy="115" rx="70" ry="52" fill="url(#bodyGrad)"/>

  <!-- 翅膀，貼身收攏 -->
  <path d="M 70,90 Q 50,105 55,140 Q 80,150 95,125 Q 80,105 70,90 Z" fill="#c4a878" stroke="#a8895a" stroke-width="1"/>
  <path d="M 150,90 Q 170,105 165,140 Q 140,150 125,125 Q 140,105 150,90 Z" fill="#c4a878" stroke="#a8895a" stroke-width="1"/>

  <!-- 頭部，偏向一側，圓潤 -->
  <circle cx="90" cy="72" r="38" fill="url(#headGrad)"/>

  <!-- 臉頰白斑 -->
  <ellipse cx="80" cy="82" rx="16" ry="12" fill="#f0e6d2"/>

  <!-- 喉部黑斑 -->
  <path d="M 78,90 Q 88,100 98,92 Q 92,105 78,102 Z" fill="#3a2a1a"/>

  <!-- 喙 -->
  <path d="M 58,70 L 40,74 L 58,80 Z" fill="#3a2a1a"/>

  <!-- 眼睛，半瞇慵懶 -->
  <path d="M 62,62 Q 68,58 74,62" fill="none" stroke="#2a1a10" stroke-width="3" stroke-linecap="round"/>

  <!-- 頭頂羽冠斑點 -->
  <ellipse cx="95" cy="45" rx="20" ry="14" fill="#6a4a28"/>
  <circle cx="86" cy="42" r="2" fill="#3a2a1a"/>
  <circle cx="98" cy="40" r="2" fill="#3a2a1a"/>
  <circle cx="108" cy="45" r="2" fill="#3a2a1a"/>

  <!-- 腹部斑點紋理 -->
  <circle cx="120" cy="110" r="2.5" fill="#b89868" opacity="0.6"/>
  <circle cx="135" cy="125" r="2" fill="#b89868" opacity="0.6"/>
  <circle cx="110" cy="135" r="2.5" fill="#b89868" opacity="0.6"/>

  <!-- 小小的腳，藏在圓身體下 -->
  <path d="M 95,165 L 92,172 M 95,165 L 98,172 M 125,165 L 122,172 M 125,165 L 128,172" stroke="#a8895a" stroke-width="2" stroke-linecap="round"/>
</svg>
